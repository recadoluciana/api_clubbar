<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <title>Pagamento Clubbar</title>

  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <script
    src="https://www.mercadopago.com/v2/security.js"
    view="checkout">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    .topo {
      background: #000;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .topo img {
      height: 68px;
    }

    .voltar {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      width: 44px;
      height: 44px;
    }

    .material-symbols-outlined {
      font-size: 30px;
    }

    .container {
      max-width: 430px;
      margin: 24px auto;
      padding: 18px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    #status {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
    }

    .status-ok {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #e8f5e9;
      color: #1b5e20;
      font-size: 16px;
      line-height: 1.5;
    }

    .status-erro {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #ffebee;
      color: #b71c1c;
      font-size: 16px;
      line-height: 1.5;
    }

    .status-pendente {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #fff8e1;
      color: #8a5a00;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="topo">
    
    <button class="voltar" onclick="voltarClubbar()">
      <span class="material-symbols-outlined">
        arrow_back
      </span>
    </button>

    <img src="/static/logo_copa.png" alt="Clubbar" />
  </div>

  <div class="container">
    <div class="card">
      <h2>Pagamento com cartão</h2>
      <div id="cardPaymentBrick_container"></div>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    
    const origem = params.get("origem") || "app";
    const appUrl =
      params.get("app_url") ||
      "https://clubbarcliente-production.up.railway.app";

    const publicKey = 'APP_USR-a48d761d-a803-412f-9a84-d73a813af1fb';
    const clienteId = params.get("cliente_id");
    const organizacaoId = params.get("organizacao_id");
    const lojaId = params.get("loja_id");
    const tipoPagamento = params.get("tipo_pagamento") || "CREDIT_CARD";
    const amount = Number(params.get("amount") || "0");

    const mp = new MercadoPago(publicKey, {
      locale: "pt-BR"
    });

    const bricksBuilder = mp.bricks();

    function irSucesso(vendaId) {
      if (origem === "web") {
        window.location.href =
          appUrl + "/?ultima_venda=" + encodeURIComponent(vendaId);
      } else {
        window.location.href = "clubbar://pagamento-sucesso";
      }
    }

    function irErro() {
      window.location.href = "clubbar://pagamento-erro";
    }

    function voltarClubbar() {
      if (origem === "web") {
        history.back();
      } else {
        window.location.href = "clubbar://pagamento-cancelado";
      }
    }

    function mensagemRecusa(statusDetail) {
      switch ((statusDetail || "").toLowerCase()) {
        case "cc_rejected_insufficient_amount":
          return "Saldo insuficiente para realizar o pagamento.";
        case "cc_rejected_other_reason":
          return "Pagamento recusado pelo emissor do cartão.";
        case "cc_rejected_bad_filled_security_code":
          return "Código de segurança (CVV) inválido.";
        case "cc_rejected_bad_filled_date":
          return "Data de validade do cartão inválida.";
        case "cc_rejected_bad_filled_card_number":
          return "Número do cartão inválido.";
        case "cc_rejected_call_for_authorize":
          return "O banco solicitou autorização. Entre em contato com a operadora do cartão.";
        case "cc_rejected_duplicated_payment":
          return "Já existe um pagamento semelhante aprovado recentemente.";
        case "cc_rejected_high_risk":
          return "Pagamento recusado por análise de segurança.";
        case "cc_rejected_blacklist":
          return "Pagamento recusado pelo emissor do cartão.";
        default:
          return "Não foi possível autorizar o pagamento.";
      }
    }

    const renderCardPaymentBrick = async () => {
      const settings = {
        initialization: {
          amount: amount
        },
        customization: {
          visual: {
            style: {
              theme: "default"
            }
          },
          paymentMethods: {
            maxInstallments: 1
          }
        },
        callbacks: {
          onReady: () => {},

          onSubmit: async (cardFormData) => {
            document.getElementById("status").innerText = "Processando pagamento...";

            const deviceId =
              window.MP_DEVICE_SESSION_ID ||
              window.deviceSessionId ||
              "";

            const body = {
              cliente_id: Number(clienteId),
              organizacao_id: Number(organizacaoId),
              loja_id: Number(lojaId),
              dsmetodopag: tipoPagamento,
              card_token: cardFormData.token,
              payment_method_id: cardFormData.payment_method_id,
              installments: cardFormData.installments || 1,
              device_id: deviceId,
              idempotency_key: crypto.randomUUID()
            };

            if (cardFormData.issuer_id) {
              body.issuer_id = cardFormData.issuer_id;
            }

            let resp;
            let data;

            try {
              resp = await fetch("/pagamentos/pagar-novo", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
              });

              data = await resp.json();
            } catch (e) {
              document.getElementById("status").innerHTML = `
                <div class="status-erro">
                  <strong>Erro no pagamento</strong><br><br>
                  Não foi possível comunicar com o servidor.
                </div>
              `;

              setTimeout(() => {
                irErro();
              }, 1800);

              return;
            }

            if (!resp.ok) {
              document.getElementById("status").innerHTML = `
                <div class="status-erro">
                  <strong>Erro no pagamento</strong><br><br>
                  Não foi possível concluir o pagamento.
                </div>
              `;

              setTimeout(() => {
                irErro();
              }, 1800);

              return;
            }

            const statusMp = (data.status_mp || "").toLowerCase();
            const statusLocal = (data.status || "").toUpperCase();

            if (statusLocal === "PAGO" || statusMp === "approved") {
              document.getElementById("status").innerHTML = `
                <div class="status-ok">
                  <strong>Pagamento aprovado!</strong><br><br>
                  Sua compra foi confirmada.
                </div>
              `;

              setTimeout(() => {
                irSucesso(data.venda_id);
              }, 1200);

            } else if (statusMp === "rejected") {
              document.getElementById("status").innerHTML = `
                <div class="status-erro">
                  <strong>Pagamento recusado</strong><br><br>
                  ${mensagemRecusa(data.status_detail)}
                </div>
              `;

              setTimeout(() => {
                irErro();
              }, 2200);

            } else if (
              statusLocal === "PENDENTE" ||
              statusMp === "pending" ||
              statusMp === "in_process"
            ) {
              document.getElementById("status").innerHTML = `
                <div class="status-pendente">
                  <strong>Pagamento em análise</strong><br><br>
                  Aguarde a confirmação.
                </div>
              `;

              setTimeout(() => {
                irSucesso(data.venda_id);
              }, 2000);

            } else {
              document.getElementById("status").innerHTML = `
                <div class="status-erro">
                  <strong>Pagamento não aprovado</strong><br><br>
                  Tente novamente pelo carrinho.
                </div>
              `;

              setTimeout(() => {
                irErro();
              }, 2000);
            }
          },

          onError: (error) => {
            console.error(error);

            document.getElementById("status").innerHTML = `
              <div class="status-erro">
                <strong>Erro ao carregar pagamento</strong><br><br>
                Tente novamente.
              </div>
            `;

            setTimeout(() => {
              irErro();
            }, 1800);
          }
        }
      };

      await bricksBuilder.create(
        "cardPayment",
        "cardPaymentBrick_container",
        settings
      );
    };

    renderCardPaymentBrick();
  </script>
</body>
</html>
